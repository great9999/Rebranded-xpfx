[[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = ['npm ci --prefer-offline --no-audit --no-fund']

[phases.build]
cmds = ['npm run build -w @workspace/api-server']

[phases.start]
cmd = 'node artifacts/api-server/dist/index.mjs'

[deploy]
healthcheckPath = '/healthz'
restartPolicyType = 'ON_FAILURE'
restartPolicyMaxRetries = 5

[healthchecks]
liveness = { path = "/healthz", interval = "30s", timeout = "5s", retries = 3 }
